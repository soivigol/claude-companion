<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Companion</title>
<link rel="stylesheet" href="./dist/main.css">
</head>
<body>

<!-- Welcome screen -->
<div class="welcome" id="welcome">
  <div class="welcome-logo">CC</div>
  <div class="welcome-title">Claude Companion</div>
  <div class="welcome-subtitle">
    A native workspace to pair with Claude Code. Select a project folder to get started.
  </div>
  <button class="welcome-btn" id="selectFolderBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Open Project Folder
  </button>
  <div class="welcome-hint">or drag a folder onto this window</div>
  <div class="recent-projects" id="recentProjects"></div>
</div>

<!-- Three-pane app (hidden until project opened) -->
<div class="app" id="app">
  <header class="header">
    <div class="header-left">
      <div class="logo">CC</div>
      <span class="project-name" id="projectName">Project</span>
      <div class="branch-badge" id="branchBadge">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 3.25a2.25 2.25 0 1 1 3 2.122V6A2.5 2.5 0 0 1 10 8.5H6a1 1 0 0 0-1 1v1.128a2.251 2.251 0 1 1-1.5 0V5.372a2.25 2.25 0 1 1 1.5 0v1.836A2.493 2.493 0 0 1 6 7h4a1 1 0 0 0 1-1v-.628A2.25 2.25 0 0 1 9.5 3.25Z"/></svg>
        <span id="branchName">&mdash;</span>
        <div class="repo-popover" id="repoPopover"></div>
      </div>
      <button class="change-folder-btn" id="changeFolderBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Change
      </button>
    </div>
    <div class="header-right">
      <span id="statusFiles">0 changed files</span>
      <span id="lastUpdate">&mdash;</span>
      <button class="theme-toggle" id="themeToggleBtn" title="Toggle theme"></button>
    </div>
  </header>

  <aside class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">Explorer</span>
      <span class="file-count" id="fileCount">0</span>
    </div>
    <div class="tree-container" id="treeContainer"></div>
  </aside>

  <div class="resize-handle" id="leftHandle"></div>

  <main class="terminal-pane">
    <div class="terminal-header">
      <span class="terminal-title">Claude Code</span>
    </div>
    <div id="terminal"></div>
  </main>

  <div class="resize-handle" id="rightHandle"></div>

  <aside class="viewer-pane">
    <div class="viewer-tabs">
      <div class="viewer-tab active" data-tab="changes">
        Changes <span class="badge" id="changesCount">0</span>
      </div>
      <div class="viewer-tab" data-tab="commits">Commits</div>
      <div class="viewer-tab" data-tab="file" id="fileTab" style="display:none">
        <span class="tab-name">File</span>
      </div>
    </div>
    <div class="viewer-panel" id="changesPanel"></div>
    <div class="viewer-panel" id="commitsPanel" style="display:none"></div>
    <div class="viewer-panel" id="filePanel" style="display:none"></div>
  </aside>

  <footer class="statusbar">
    <div class="statusbar-left">
      <span>Claude Companion</span>
    </div>
    <div class="statusbar-right">
      <span id="updateStatus"></span>
      <span id="statusBarPath"></span>
    </div>
  </footer>
</div>

<script src="./dist/main.js"></script>
</body>
</html>
